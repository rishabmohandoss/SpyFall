<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spyfall</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ── SETUP SCREEN ── -->
  <div id="setupScreen" class="screen active">
    <h1>Spyfall</h1>
    <p>Enter players, choose settings, and begin.</p>

    <label for="playerCount">Players</label>
    <select id="playerCount"></select>

    <label for="spyCount">Spies</label>
    <select id="spyCount">
      <option value="1">1 Spy</option>
      <option value="2">2 Spies</option>
    </select>

    <label for="timerSelect">Timer</label>
    <select id="timerSelect">
      <option value="5">5 minutes</option>
      <option value="8">8 minutes</option>
      <option value="10">10 minutes</option>
      <option value="15">15 minutes</option>
    </select>

    <div id="playerNameInputs"></div>

    <button onclick="startSetup()">Begin Session</button>
  </div>

  <!-- ── REVEAL SCREEN ── -->
  <div id="revealScreen" class="screen">
    <h1>Tap Your Name</h1>
    <p>View your role privately, then pass the phone.</p>
    <div id="playerButtons"></div>
    <div id="card"></div>
    <button id="startGameBtn" onclick="startGame()">Start Game</button>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="gameScreen" class="screen">
    <h1>In Session</h1>
    <p>Question, deduce, and accuse.</p>
    <div id="timerDisplay"></div>
  </div>

  <script src="locations.js"></script>
  <script src="script.js"></script>

</body>
</html>
